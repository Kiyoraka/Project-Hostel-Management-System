<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Hostel Management</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">

  <link rel="stylesheet" href="../assets/style/tokens.css">
  <link rel="stylesheet" href="../assets/style/base.css">
  <link rel="stylesheet" href="../assets/style/dashboard.css">
  <link rel="stylesheet" href="../assets/style/admin.css">

  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="../assets/script/auth.js"></script>
  <script defer src="../assets/script/store.js"></script>
  <script defer src="../assets/script/seed.js"></script>
  <script defer src="../assets/script/ui.js"></script>
  <script defer src="../assets/script/admin-users.js"></script>
  <script defer src="../assets/script/admin-rooms.js"></script>
  <script defer src="../assets/script/admin-rentals.js"></script>
  <script defer src="../assets/script/admin-maintenance.js"></script>
  <script defer src="../assets/script/admin-maintenance-tabbed.js"></script>
  <script defer src="../assets/script/admin-settings.js"></script>
  <script defer src="../assets/script/admin-hostel.js"></script>
  <script defer src="../assets/script/admin-residents.js"></script>
  <script defer src="../assets/script/admin-transportation.js"></script>
  <script defer src="../assets/script/admin-billing.js"></script>
  <script defer src="../assets/script/admin-staff.js"></script>
  <script defer src="../assets/script/admin-helpdesk.js"></script>
  <script defer src="../assets/script/admin-profile.js"></script>
  <script defer src="../assets/script/admin.js"></script>
</head>
<body class="dashboard-body">

  <aside class="sidebar" aria-label="Admin navigation">
    <div class="sidebar__logo">
      <i class="fa-solid fa-building" aria-hidden="true"></i>
      <span>Hostel Admin</span>
    </div>

    <nav class="sidebar__nav">
      <div class="sidebar__section">
        <div class="sidebar__section-title">Main</div>
        <a class="sidebar__nav-item" href="#/" data-route="/">
          <i class="fa-solid fa-gauge-high" aria-hidden="true"></i><span>Dashboard</span>
        </a>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__section-title">Operations</div>
        <a class="sidebar__nav-item" href="#/hostel" data-route="/hostel">
          <i class="fa-solid fa-building" aria-hidden="true"></i><span>Hostel Management</span>
        </a>
        <a class="sidebar__nav-item" href="#/residents" data-route="/residents">
          <i class="fa-solid fa-users" aria-hidden="true"></i><span>Resident Management</span>
        </a>
        <a class="sidebar__nav-item" href="#/maintenance" data-route="/maintenance">
          <i class="fa-solid fa-screwdriver-wrench" aria-hidden="true"></i><span>Maintenance</span>
        </a>
        <a class="sidebar__nav-item" href="#/transportation" data-route="/transportation">
          <i class="fa-solid fa-van-shuttle" aria-hidden="true"></i><span>Transportation</span>
        </a>
        <a class="sidebar__nav-item" href="#/billing" data-route="/billing">
          <i class="fa-solid fa-money-bill-wave" aria-hidden="true"></i><span>Billings &amp; Payment</span>
        </a>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__section-title">People</div>
        <a class="sidebar__nav-item" href="#/staff" data-route="/staff">
          <i class="fa-solid fa-user-tie" aria-hidden="true"></i><span>Staff &amp; Users</span>
        </a>
        <a class="sidebar__nav-item" href="#/helpdesk" data-route="/helpdesk">
          <i class="fa-solid fa-life-ring" aria-hidden="true"></i><span>Helpdesk</span>
        </a>
      </div>

      <div class="sidebar__divider"></div>

      <div class="sidebar__section">
        <div class="sidebar__section-title">Account</div>
        <a class="sidebar__nav-item" href="#/profile" data-route="/profile">
          <i class="fa-solid fa-id-card" aria-hidden="true"></i><span>Profile</span>
        </a>
        <a class="sidebar__nav-item" href="#/settings" data-route="/settings">
          <i class="fa-solid fa-gear" aria-hidden="true"></i><span>Settings</span>
        </a>
      </div>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__user-avatar" data-user-avatar>HA</div>
        <div class="sidebar__user-meta">
          <div class="sidebar__user-name" data-user-name>Hostel Admin</div>
          <div class="sidebar__user-role">Admin</div>
        </div>
      </div>
      <button type="button" class="sidebar__logout" data-logout>
        <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar__left">
      <button type="button" class="topbar__toggle" data-sidebar-toggle aria-label="Toggle sidebar">
        <i class="fa-solid fa-bars" aria-hidden="true"></i>
      </button>
      <div class="topbar__title" data-page-title>Overview</div>
    </div>
    <div class="topbar__right">
      <button type="button" class="topbar__bell" aria-label="Notifications">
        <i class="fa-solid fa-bell" aria-hidden="true"></i>
        <span class="topbar__bell-dot"></span>
      </button>
      <div class="topbar__user" data-user-menu>
        <div class="topbar__user-avatar" data-user-avatar>HA</div>
        <span class="topbar__user-name" data-user-name>Hostel Admin</span>
        <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
      </div>
    </div>
  </header>

  <main class="dashboard-content" id="app-content">
    <div class="empty-state">
      <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
      <h3>Loading...</h3>
    </div>
  </main>

</body>
</html>
